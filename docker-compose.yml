services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./backend/uploads:/var/www/uploads:ro
    restart: unless-stopped
