services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/xingxiyu520/xingxiyu520.github.io-backend:${IMAGE_TAG:-latest}}
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-ghcr.io/xingxiyu520/xingxiyu520.github.io-web:${IMAGE_TAG:-latest}}
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./backend/uploads:/var/www/uploads:ro
    restart: unless-stopped
